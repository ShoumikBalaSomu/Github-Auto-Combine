<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omniverse IPTV Player</title>
    <!-- Include HLS.js for browser streaming -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Sidebar Navigation -->
    <nav class="sidebar glass">
        <div class="logo">
            <h2>🌌 Omniverse</h2>
            <p>V6 Peak Premium</p>
        </div>
        <ul class="nav-links">
            <li class="active" onclick="switchTab('live')">📺 Live TV</li>
            <li onclick="switchTab('movies')">🎬 Movies VOD</li>
            <li onclick="switchTab('series')">🍿 TV Series</li>
            <li onclick="switchTab('settings')">⚙️ Settings</li>
        </ul>
        
        <div class="auth-box">
            <p><strong>Auth Token:</strong></p>
            <input type="password" id="authToken" placeholder="Enter JWT key..." onchange="saveToken()">
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="content">
        <header class="glass-header">
            <input type="text" id="searchInput" placeholder="Search channels or movies..." onkeyup="filterContent()">
        </header>

        <div id="loading" class="loading">Loading Omniverse Database...</div>

        <!-- Live TV Grid -->
        <section id="live" class="grid-container active-tab"></section>
        
        <!-- Movies Grid -->
        <section id="movies" class="grid-container hidden-tab"></section>

        <!-- Series Grid -->
        <section id="series" class="grid-container hidden-tab"></section>
    </main>

    <!-- Video Player Modal -->
    <div id="playerModal" class="modal hidden">
        <div class="modal-content glass">
            <span class="close-btn" onclick="closePlayer()">&times;</span>
            <h2 id="playerTitle">Channel Name</h2>
            <div class="video-container">
                <video id="videoPlayer" controls autoplay></video>
            </div>
            <div id="playerError" class="error-msg hidden">Stream is currently offline or unauthorized.</div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
